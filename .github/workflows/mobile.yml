name: Mobile Build
run-name: ${{ github.event.inputs.build_name }}

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
    
      build_name:
        description: Build Name
        required: true
        default: Mobile Build
        
      android_flags:
        description: Android Flags
        required: false
        default:
        
      ios_flags:
        description: Ios Flags
        required: false
        default: -nosign
        
      platform:
        description: "Build platform"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - android
          - ios
          
      rebuild_cache:
        description: "Rebuild Cache?"
        required: true
        default: "No"
        type: choice
        options:
          - "Yes"
          - "No"

      release_type:
        description: "Choose release type"
        required: false
        default: "Release"
        type: choice
        options:
          - "Release"
          - "Pre-Release"
          
      release:
         description: "Release APK?"
         required: true
         default: "No"
         type: choice
         options:
          - "Yeah"
          - "No"
          
jobs:
  buildAndroid:
    if: ${{ github.event_name == 'push' || github.event.inputs.platform == 'android' || github.event.inputs.platform == 'all' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.7

      - uses: actions/setup-java@v4
        with:
         distribution: temurin
         java-version: '17'

      - name: Restore cache
        if: ${{ github.event_name == 'push' || github.event.inputs.rebuild_cache != 'Yes' || github.event_name == 'push'}}
        uses: actions/cache/restore@v4
        with:
         path: |
          ~/.haxelib
          ~/.lime
          ~/.openfl
          ~/.gradle/wrapper
          ~/Android/Sdk
          /home/runner/hxcpp_cache
         key: android-cache-${{ runner.os }}
         restore-keys: |
          android-cache-${{ runner.os }}-

      - name: Delete OpenFL
        run: rm -rf ~/.haxelib/openfl

      - name: Setup environment
        run: |
         mkdir -p /home/runner/hxcpp_cache
         echo '<xml>
          <set name="HXCPP_COMPILE_CACHE" value="/home/runner/hxcpp_cache" />
          <set name="HXCPP_CACHE_MB" value="4096" />
         </xml>' > ~/.hxcpp_config.xml
          haxelib setup ~/haxelib

          haxe -cp commandline -D analyzer-optimize --run Main setup --silent
          
          printf "%s\n%s\n%s\n" \
            "$ANDROID_HOME" \
            "$ANDROID_NDK_ROOT" \
            "$JAVA_HOME" \
            | haxelib run lime setup android  

          haxelib list

      - name: Install neccessary android tools
        run: |
          mkdir -p ~/android-sdk
          cd ~/android-sdk
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-*.zip

          mkdir cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ || true

          yes | ~/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          ~/android-sdk/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;29.0.14206865"

          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$HOME/android-sdk/ndk/29.0.14206865" >> $GITHUB_ENV

      - name: Build Apk
        run: |
         mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx5g -XX:MaxMetaspaceSize=1536m -Dfile.encoding=UTF-8" > ~/.gradle/gradle.properties
          echo "org.gradle.daemon=false" >> ~/.gradle/gradle.properties
          echo "org.gradle.parallel=false" >> ~/.gradle/gradle.properties
          echo "org.gradle.configureondemand=false" >> ~/.gradle/gradle.properties
          echo "android.splits.abi.enable=false" >> ~/.gradle/gradle.properties
          echo "JAVA_TOOL_OPTIONS=-Xmx5g" >> $GITHUB_ENV
          echo "${{ secrets.KEYSTORE }}" | base64 -d > keystore.jks
          find ~/hxcpp_cache -name "*.pch" -delete
         haxelib run lime clean android
         haxelib run lime build android -final -release \
           --certificate-path="keystore.jks" \
           --certificate-alias="${{ secrets.KEYSTORE_ALIAS }}" \
           --certificate-password="${{ secrets.KEYSTORE_PASSWORD }}" \
           --certificate-alias-password="${{ secrets.KEY_PASSWORD }}" \
           -clean ${{ github.event.inputs.android_flags }}
         find . -name "*.apk"
         
      - name: Save cache
        if: ${{ success() && (github.event_name == 'push' || github.event.inputs.rebuild_cache != 'Yes' || github.event_name == 'push') }}
        uses: actions/cache/save@v4
        with:
         path: |
          ~/.haxelib
          ~/.lime
          ~/.openfl
          ~/.gradle/wrapper
          ~/Android/Sdk
          /home/runner/hxcpp_cache
         key: android-cache-${{ runner.os }}

      - uses: actions/upload-artifact@v4
        with:
          name: androidBuild
          path: export/release/android/bin/app/build/outputs/apk/release/*.apk

  buildiOS:
    if: ${{ github.event_name == 'push' || github.event.inputs.platform == 'ios' || github.event.inputs.platform == 'all' }}
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.7
          architecture: arm64

      - name: Restore cache
        if: ${{ github.event_name == 'push' || github.event.inputs.rebuild_cache != 'Yes' || github.event_name == 'push'}}
        uses: actions/cache/restore@v4
        with:
         path: |
          ~/haxelib
          ~/.lime
          ~/.openfl
          ~/hxcpp_cache
          ~/Library/Developer/Xcode/DerivedData
          export/ios/build
         key: ios-cache-${{ runner.os }}-${{ hashFiles('**/project.xml') }}
         restore-keys: |
          ios-cache-${{ runner.os }}-

      - name: Setup environment
        run: |
          haxelib setup ~/haxelib
          
          haxe -cp commandline -D analyzer-optimize --run Main setup --silent

          echo "n" | haxelib run lime setup ios

          haxelib remove lime
          haxelib install lime 8.2.1
          
      - name: Clean iOS
        run: haxelib run lime clean ios

      - name: Build iOS
        run: |
          rm -rf export/ios/build
          rm -rf $PWD/build
          haxelib run lime build ios ${{ github.event.inputs.ios_flags }}
          find . -name "*.ipa"
           
      - name: Compile Xcode Project
        run: |
          xcodebuild \
           -project export/release/ios/CodenameEngine.xcodeproj \
           -scheme CodenameEngine \
           -configuration Release \
           -sdk iphoneos \
           -derivedDataPath $PWD/build \
           CODE_SIGNING_ALLOWED=NO \
           CODE_SIGNING_REQUIRED=NO \
           CODE_SIGN_IDENTITY="" \
           DEVELOPMENT_TEAM="" \
           PROVISIONING_PROFILE_SPECIFIER="" \
           build

      - name: Export Ipa
        run: |
          mkdir -p Payload
          
          cp -r $PWD/build/Build/Products/Release-iphoneos/CodenameEngine.app Payload/
          
          mkdir -p outputs/ipa/debug
          zip -qr outputs/ipa/debug/CodenameEngine-debug.ipa Payload

      - name: Save cache
        if: ${{ success() && (github.event_name == 'push' || github.event.inputs.rebuild_cache != 'Yes' || github.event_name == 'push') }}
        uses: actions/cache/save@v4
        with:
         path: |
          ~/hxcpp_cache
          export/ios
         key: ios-cache-${{ runner.os }}-${{ hashFiles('**/project.xml') }}
          
      - uses: actions/upload-artifact@v4
        with:
          name: iosBuild
          path: outputs/ipa/debug/*
          if-no-files-found: ignore

  release:
   name: Release APK
   if: ${{ github.event.inputs.release == 'Yeah' }}
   needs: [buildAndroid, buildiOS]
   permissions: write-all
   runs-on: ubuntu-latest

   steps:
      - name: get latest workflow run
        id: latest_run
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              status: 'success',
              per_page: 20
            });

            const currentRunId = context.runId;

            const latest = runs.data.workflow_runs.find(
              run => run.id !== currentRunId
            );

            if (!latest) {
              core.setFailed('No successful workflow runs found.');
              return;
            }

            core.setOutput('run_id', latest.id.toString());

      - name: extract all zip artifacts
        run: |
         mkdir -p extracted

         echo "Searching for zip files..."
         find . -type f -name "*.zip" | while read file; do
           echo "Extracting $file"
           unzip -o "$file" -d extracted
         done
  
         echo "Contents of extracted:"
         ls -R extracted || true

      - name: file stuff
        run: |
         mkdir -p release-files

         cp artifacts/androidBuild/*.apk release-files/ || true
         cp artifacts/iosBuild/*.ipa release-files/ || true
   
         echo "Files found:"
         ls -R release-files

         if [ -z "$(ls -A release-files)" ]; then
            echo "No APK or IPA files found."
            exit 1
         fi

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_number }}
          name: Release ${{ github.run_number }}
          prerelease: ${{ inputs.release_type == 'Pre-Release' }}
          files: |
            release-files/*.apk
            release-files/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
