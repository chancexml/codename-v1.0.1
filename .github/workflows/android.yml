name: Mobile Build
run-name: ${{ github.event.inputs.build_name }}

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_name:
        description: Build Name
        required: true
        default: Mobile Build
      android_flags:
        description: Android Flags
        required: false
        default:
      release_type:
        description: "Choose release type"
        required: true
        default: "Pre-Release"
        type: choice
        options:
          - "Release"
          - "Pre-Release"
      release:
         description: "Release APK?"
         required: true
         default: "No"
         type: choice
         options:
          - "Yes"
          - "No"
jobs:
  buildAndroid:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: krdlab/setup-haxe@master
        with:
          haxe-version: 4.3.7

      - uses: actions/setup-java@v4
        with:
         distribution: temurin
         java-version: '17'

      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
         path: |
          ~/.haxelib
          ~/.lime
          ~/.openfl
          ~/.gradle/wrapper
          ~/Android/Sdk
          /home/runner/hxcpp_cache
         key: android-cache-${{ runner.os }}
         restore-keys: |
          android-cache-${{ runner.os }}-

      - name: Delete OpenFL
        run: rm -rf ~/.haxelib/openfl

      - name: Setup environment
        run: |
         mkdir -p /home/runner/hxcpp_cache
         echo '<xml>
          <set name="HXCPP_COMPILE_CACHE" value="/home/runner/hxcpp_cache" />
          <set name="HXCPP_CACHE_MB" value="4096" />
         </xml>' > ~/.hxcpp_config.xml
          haxelib setup ~/haxelib

          haxe -cp commandline -D analyzer-optimize --run Main setup --silent
          
          printf "%s\n%s\n%s\n" \
            "$ANDROID_HOME" \
            "$ANDROID_NDK_ROOT" \
            "$JAVA_HOME" \
            | haxelib run lime setup android  

          haxelib list

      - name: Install neccessary android tools
        run: |
          mkdir -p ~/android-sdk
          cd ~/android-sdk
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-*.zip

          mkdir cmdline-tools/latest
          mv cmdline-tools/* cmdline-tools/latest/ || true

          yes | ~/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          ~/android-sdk/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2" \
            "ndk;29.0.14206865"

          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$HOME/android-sdk/ndk/29.0.14206865" >> $GITHUB_ENV

      - name: Build Apk
        run: |
         mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx5g -XX:MaxMetaspaceSize=1536m -Dfile.encoding=UTF-8" > ~/.gradle/gradle.properties
          echo "org.gradle.daemon=false" >> ~/.gradle/gradle.properties
          echo "org.gradle.parallel=false" >> ~/.gradle/gradle.properties
          echo "org.gradle.configureondemand=false" >> ~/.gradle/gradle.properties
          echo "android.splits.abi.enable=false" >> ~/.gradle/gradle.properties
          echo "JAVA_TOOL_OPTIONS=-Xmx5g" >> $GITHUB_ENV
          echo "${{ secrets.KEYSTORE }}" | base64 -d > keystore.jks
         haxelib run lime clean android
         haxelib run lime build android -final -release \
           --certificate-path="keystore.jks" \
           --certificate-alias="${{ secrets.KEYSTORE_ALIAS }}" \
           --certificate-password="${{ secrets.KEYSTORE_PASSWORD }}" \
           --certificate-alias-password="${{ secrets.KEY_PASSWORD }}" \
           -clean ${{ github.event.inputs.android_flags }}
         find . -name "*.apk"
         
      - name: Save cache
        uses: actions/cache/save@v4
        with:
         path: |
          ~/.haxelib
          ~/.lime
          ~/.openfl
          ~/.gradle/wrapper
          ~/Android/Sdk
          /home/runner/hxcpp_cache
         key: android-cache-${{ runner.os }}

      - uses: actions/upload-artifact@v4
        with:
          name: Android-Release
          path: export/release/android/bin/app/build/outputs/apk/release/*.apk

  release:
   name: Release APK
   needs: [buildAndroid]
   permissions: write-all
   runs-on: ubuntu-latest

   steps:
      - name: Download Android
        uses: actions/download-artifact@v4
        with:
          name: android-build
          path: dist/android

      - name: extract all zip artifacts
        run: |
         mkdir -p extracted

         echo "Searching for zip files..."
         find . -type f -name "*.zip" | while read file; do
           echo "Extracting $file"
           unzip -o "$file" -d extracted
         done
  
         echo "Contents of extracted:"
         ls -R extracted || true

      - name: file stuff
        run: |
         mkdir -p release-files

         cp artifacts/Android-Build/*.apk release-files/ || true
         cp artifacts/iosBuild/*.ipa release-files/ || true
   
         echo "Files found:"
         ls -R release-files

         if [ -z "$(ls -A release-files)" ]; then
            echo "No APK or IPA files found."
            exit 1
         fi

      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_number }}
          name: Release ${{ github.run_number }}
          prerelease: ${{ inputs.release_type == 'Pre-Release' }}
          files: |
            release-files/*.apk
            release-files/*.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
